name: Java Tests with Selenium

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Поднимаем контейнер с БД
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: maiapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Install Chrome (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install API dependencies
        run: npm install

      - name: Install http-server
        run: npm install -g http-server

      - name: Prepare .env.test
        run: |
          cat > .env.test << EOF
          PORT=3001
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=postgres
          DB_PASS=password
          DB_NAME=maiapp
          BASIC_LOGIN=admin
          BASIC_PASS=secret
          # Добавьте другие переменные, которые нужны вашему API
          EOF

      - name: Run database migrations (если нужны)
        #run: npm run migrate   # или скрипт инициализации БД
        # Если миграций нет, создайте таблицы вручную через скрипт

      - name: Start API
        run: |
          echo "Starting API on port 3001..."
          DOTENV_CONFIG_PATH=.env.test node server.js > api.log 2>&1 &
          sleep 10
          echo "API logs:"
          cat api.log
          # Проверяем доступность
          curl -v http://localhost:3001 || echo "API not reachable"

      - name: Prepare UI
        run: |
          # Копируем UI во временную папку
          cp -r ./webapp ./webapp-test
          # Заменяем адрес API на localhost:3001
          sed -i 's|http://89.169.15.36:3000|http://localhost:3001|g' ./webapp-test/index.html

      - name: Start UI
        run: |
          echo "Starting UI on port 8081..."
          http-server ./webapp-test -p 8081 > ui.log 2>&1 &
          sleep 5
          echo "UI logs:"
          cat ui.log
          curl -v http://localhost:8081 || echo "UI not reachable"

      - name: Run tests
        run: mvn clean test -Dapp.url=http://localhost:8081

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
