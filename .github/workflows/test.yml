name: Java Tests with Selenium

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Install Chrome (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install http-server globally
        run: npm install -g http-server

      - name: Start test API and UI in background
        run: |
          # Создаём .env.test для API (если нужно)
          cp .env .env.test 2>/dev/null || true
          sed -i 's/^PORT=.*/PORT=3001/' .env.test

          # Запускаем API с отдельным .env.test
          DOTENV_CONFIG_PATH=.env.test node servertest.js &
          # Если API называется servertest.js, замените server.js на servertest.js

          # Копируем UI во временную папку и подменяем адрес API
          cp -r ./webapp ./webapp-test
          sed -i 's|http://89.169.15.36:3000|http://localhost:3001|g' ./webapp-test/index.html

          # Запускаем статический сервер на порту 8081
          http-server ./webapp-test -p 8081 &

          # Ждём, пока сервисы поднимутся
          echo "Waiting for services to start..."
          sleep 10

          # Проверяем доступность API (опционально)
          curl -s http://localhost:3001/health || echo "API not ready"

      - name: Run tests
        run: |
          mvn clean test -Dapp.url=http://localhost:8081

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
