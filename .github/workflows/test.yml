name: Java Tests with Selenium

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Install Chrome (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Start test instances on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "bash -s" << EOF
            PROD_DIR=~/maiapp
            TEST_DIR=~/maiapp-test

            # Очистка предыдущих тестовых процессов и папок
            pm2 delete maiapp-test 2>/dev/null || true
            pm2 delete maiapp-ui-test 2>/dev/null || true
            rm -rf \$TEST_DIR

            # Копируем продакшен-директорию
            cp -r \$PROD_DIR \$TEST_DIR
            cd \$TEST_DIR

            # Готовим .env для тестового API (порт 3001)
            cp .env .env.test
            sed -i 's/^PORT=.*/PORT=3001/' .env.test

            # Убеждаемся, что http-server установлен глобально
            npm list -g http-server || npm install -g http-server

            # Запуск API на порту 3001
            DOTENV_CONFIG_PATH=.env.test pm2 start server.js --name maiapp-test

            # Подготовка UI: копируем и подменяем адрес API на тестовый порт (3001)
            cp -r webapp webapp-test
            sed -i "s|http://89.169.15.36:3000|http://$SERVER_HOST:3001|g" webapp-test/index.html

            # Запуск UI на порту 8081
            pm2 start http-server --name maiapp-ui-test -- webapp-test -p 8081

            # Ждём, пока сервисы поднимутся
            sleep 10

            # Проверка доступности API (опционально)
            curl -s http://localhost:3001/health || echo "API not ready"
          EOF

      - name: Run tests
        run: |
          mvn clean test -Dapp.url=http://${{ secrets.SERVER_HOST }}:8081

      - name: Stop test instances
        if: always()
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "bash -s" << EOF
            pm2 delete maiapp-test
            pm2 delete maiapp-ui-test
            rm -rf ~/maiapp-test
          EOF

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
