name: Security Scan (BDU)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bdu-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run BDU vulnerability check
        run: python .github/scripts/check_bdu_vulns.py
