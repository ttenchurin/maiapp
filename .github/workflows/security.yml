name: Security Scan (NVD)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  nvd-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Check for vulnerabilities in dependencies
        run: python .github/scripts/check_nvd_vulns.py

