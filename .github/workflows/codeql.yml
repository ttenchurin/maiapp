name: "CodeQL Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        output: sarif-results
        upload: never

    # Диагностический шаг – помогает убедиться, что SARIF-файл создан
    - name: Debug SARIF directory
      run: |
        echo "Listing current directory:"
        ls -la
        if [ -d sarif-results ]; then
          echo "Contents of sarif-results:"
          ls -la sarif-results/
        else
          echo "❌ sarif-results directory not found"
        fi

    # Основная проверка на SQL-инъекции
    - name: Check for SQL injection issues
      run: |
        # Находим любой SARIF-файл в директории sarif-results
        SARIF_FILE=$(find sarif-results -name "*.sarif" | head -n 1)
        if [ -z "$SARIF_FILE" ]; then
          echo "❌ No SARIF file found. CodeQL analysis may have failed."
          exit 1
        fi
        echo "🔍 Analyzing $SARIF_FILE"

        # Устанавливаем jq (если ещё не установлен)
        sudo apt-get update && sudo apt-get install -y jq

        # Извлекаем все результаты, подходящие под критерии SQL-инъекций
        ISSUES_JSON=$(jq -c '.runs[].results[] | select(
          (.ruleId | test("sql-injection|sql|database"; "i")) or
          (.message.text | test("user-controlled|SQL injection|database query built from user-controlled"; "i"))
        )' "$SARIF_FILE")

        if [ -n "$ISSUES_JSON" ]; then
          COUNT=$(echo "$ISSUES_JSON" | wc -l)
          echo "❌ Found $COUNT potential SQL injection vulnerabilities:"

          # Обрабатываем каждое предупреждение
          echo "$ISSUES_JSON" | while read -r result; do
            echo "---"
            ruleId=$(echo "$result" | jq -r '.ruleId // "unknown"')
            message=$(echo "$result" | jq -r '.message.text // "No message"')

            # Извлекаем местоположение (если есть)
            location=$(echo "$result" | jq -c '.locations[0].physicalLocation')
            if [ "$location" != "null" ] && [ -n "$location" ]; then
              uri=$(echo "$location" | jq -r '.artifactLocation.uri // ""')
              startLine=$(echo "$location" | jq -r '.region.startLine // ""')
              # Пробуем получить фрагмент кода
              snippet=$(echo "$location" | jq -r '.contextRegion.snippet.text // .region.snippet.text // ""')
              if [ -z "$snippet" ] || [ "$snippet" = "null" ]; then
                snippet="(no snippet)"
              fi

              echo "Rule: $ruleId"
              echo "Message: $message"
              echo "File: $uri"
              echo "Line: $startLine"
              echo "Code snippet: $snippet"
            else
              echo "Rule: $ruleId"
              echo "Message: $message"
              echo "Location: not specified"
            fi
          done

          exit 1
        else
          echo "✅ No SQL injection issues detected."
        fi
