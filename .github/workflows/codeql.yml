name: "CodeQL Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        output: sarif-results
        upload: never  # Не загружаем результаты автоматически, обработаем сами

    - name: Check for errors in SARIF
      run: |
        if [ -f sarif-results/${{ matrix.language }}.sarif ]; then
          sudo apt-get update && sudo apt-get install -y jq
          issues=$(jq '.runs[].results[] | select(.level == "error" or .level == "warning")' sarif-results/${{ matrix.language }}.sarif)
          if [ -n "$issues" ]; then
            echo "❌ CodeQL found security issues:"
            echo "$issues"
            exit 1
          else
            echo "✅ No critical issues found."
          fi
        else
          echo "SARIF file not found."
        fi
