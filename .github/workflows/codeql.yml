name: "CodeQL Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        output: sarif-results
        upload: never

    - name: Debug SARIF directory
      run: |
        echo "Listing current directory:"
        ls -la
        if [ -d sarif-results ]; then
          echo "Contents of sarif-results:"
          ls -la sarif-results/
        else
          echo "❌ sarif-results directory not found"
        fi

    - name: Check for SQL injection issues
      run: |
        # Находим любой SARIF-файл в директории
        SARIF_FILE=$(find sarif-results -name "*.sarif" | head -n 1)
        if [ -z "$SARIF_FILE" ]; then
          echo "❌ No SARIF file found. CodeQL analysis may have failed."
          exit 1
        fi
        echo "🔍 Analyzing $SARIF_FILE"
        sudo apt-get update && sudo apt-get install -y jq
        # Ищем уязвимости SQL-инъекций по ключевым словам
        issues=$(jq '.runs[].results[] | select(
          (.ruleId | test("sql-injection|sql|database"; "i")) or
          (.message.text | test("user-controlled|SQL injection|database query built from user-controlled"; "i"))
        )' "$SARIF_FILE")
        if [ -n "$issues" ]; then
          echo "❌ Found potential SQL injection vulnerabilities:"
          echo "$issues"
          exit 1
        else
          echo "✅ No SQL injection issues detected."
        fi
