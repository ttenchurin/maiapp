name: "CodeQL Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        output: sarif-results
        upload: never

    - name: Check for SQL injection issues
      run: |
        if [ -f sarif-results/${{ matrix.language }}.sarif ]; then
          echo "🔍 Searching for SQL injection vulnerabilities..."
          # Устанавливаем jq
          sudo apt-get update && sudo apt-get install -y jq
          # Ищем результаты, где ruleId содержит "sql-injection" или message содержит "user-controlled"
          issues=$(jq '.runs[].results[] | select(
            (.ruleId | test("sql-injection"; "i")) or
            (.message.text | test("user-controlled|SQL injection"; "i"))
          )' sarif-results/${{ matrix.language }}.sarif)
          if [ -n "$issues" ]; then
            echo "❌ Found potential SQL injection vulnerabilities:"
            echo "$issues"
            exit 1
          else
            echo "✅ No SQL injection issues detected."
          fi
        else
          echo "SARIF file not found."
        fi
